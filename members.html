<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SultanAuwal — Members</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --carton-cream: #FCF7F0;
    --carton-almond: #E8D5BC;
    --premium-gold: #CBA258;
    --premium-slate: #1E1E2A;
    --premium-charcoal: #06111f;
    --glass-core: rgba(252, 247, 240, 0.07);
    --glass-border-light: rgba(252, 247, 240, 0.13);
    --shadow-premium: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(203, 162, 88, 0.15);
    --transition-smooth: cubic-bezier(0.2, 0.9, 0.4, 1.1);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --lvl-500: #7c3aed;
    --lvl-400: #0d9488;
    --lvl-300: #1d4ed8;
    --lvl-200: #b45309;
  }

  html { scroll-behavior: smooth; }

  /* ── BODY: full page, fixed topbar + bottom nav offsets ── */
  body {
    background: #06111f;
    color: #fff;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    padding-top: 60px;    /* height of fixed topbar */
    padding-bottom: 80px; /* height of fixed bottom nav */
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Ambient orb background — fixed so it doesn't scroll */
  .orb-bg {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    animation: floatPremium 18s infinite alternate;
  }
  .orb-1 { width: 340px; height: 340px; top: -80px; left: -80px; background: radial-gradient(circle, rgba(217,108,108,0.12), transparent 70%); }
  .orb-2 { width: 360px; height: 360px; bottom: -60px; right: -60px; background: radial-gradient(circle, rgba(203,162,88,0.14), transparent 70%); animation-duration: 24s; }
  @keyframes floatPremium {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(20px,20px) scale(1.15); }
  }

  /* ── FIXED TOP BAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 150;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 60px;
    background: #0b1a35;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.13);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .logo-text { color: #fff; font-weight: 700; font-size: 17px; letter-spacing: 0.3px; }
  .logo-text span { color: #4e9eff; }

  .menu-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.13);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; transition: background 0.2s;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.13); }
  .menu-btn span { display: block; height: 2px; background: #fff; border-radius: 2px; }
  .menu-btn span:nth-child(1) { width: 18px; }
  .menu-btn span:nth-child(2) { width: 18px; }
  .menu-btn span:nth-child(3) { width: 12px; align-self: flex-end; }

  /* ── FIXED BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    display: flex; background: #0d1f3c;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 10px 0 14px;
  }
  .nav-item {
    flex: 1; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 0;
  }
  .nav-icon {
    width: 26px; height: 26px; border-radius: 7px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .nav-label { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.4); letter-spacing: 0.2px; transition: color 0.2s; }
  .nav-item.active .nav-icon { background: rgba(99,160,255,0.22); border-color: rgba(99,160,255,0.5); }
  .nav-item.active .nav-label { color: #6aa0ff; font-weight: 700; }

  /* ── FIXED OVERLAY ── */
  .overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  /* ── FIXED SLIDE PANEL ── */
  .panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 78%; max-width: 320px;
    background: #0f2142; z-index: 400;
    display: flex; flex-direction: column;
    transform: translateX(105%);
    transition: transform 0.32s cubic-bezier(0.32,0,0.15,1);
    box-shadow: -12px 0 40px rgba(0,0,0,0.5);
  }
  .panel.open { transform: translateX(0); }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
  }
  .panel-title { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
  .close-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.09); border: 1.5px solid rgba(255,255,255,0.14);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 17px; line-height: 1; transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.16); }
  .menu-list {
    flex: 1; overflow-y: auto; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 8px; scrollbar-width: none;
  }
  .menu-list::-webkit-scrollbar { display: none; }
  .menu-item {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 14px; border-radius: 14px;
    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.07);
    cursor: pointer; width: 100%; text-align: left;
    transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .menu-item:hover { background: rgba(255,255,255,0.07); }
  .menu-item.active {
    background: linear-gradient(135deg, #1a3a6e 0%, #1e4580 100%);
    border-color: rgba(99,160,255,0.35);
    box-shadow: 0 4px 20px rgba(20,80,180,0.3);
  }
  .item-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.1);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden;
    transition: background 0.18s, border-color 0.18s;
  }
  .menu-item.active .item-icon { background: rgba(99,160,255,0.16); border-color: rgba(99,160,255,0.4); }
  .item-label {
    flex: 1; color: rgba(255,255,255,0.75); font-weight: 500; font-size: 15px; letter-spacing: 0.2px;
    transition: color 0.18s, font-weight 0.18s;
  }
  .menu-item.active .item-label { color: #fff; font-weight: 700; }
  .chevron { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.35; transition: opacity 0.18s; }
  .menu-item.active .chevron { opacity: 1; }

  /* ── PAGE CONTENT WRAPPER ── */
  .page-wrap {
    position: relative; z-index: 2;
    max-width: 520px;
    margin: 0 auto;
    padding: 0 0 24px;
  }

  /* Hero */
  .hero-section {
    padding: 28px 20px 18px;
    text-align: center;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.7s 0.3s var(--ease-out) forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .carton-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(252,247,240,0.07);
    backdrop-filter: blur(8px);
    padding: 5px 16px; border-radius: 100px;
    border: 1px solid rgba(203,162,88,0.35);
    font-size: 10px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--carton-cream);
    margin-bottom: 14px;
  }
  .home-title {
    font-family: 'Manrope', sans-serif;
    font-size: clamp(24px, 7vw, 34px);
    font-weight: 800; letter-spacing: -0.02em; line-height: 1.1;
    background: linear-gradient(135deg, #FFFFFF 30%, var(--carton-cream) 60%, var(--premium-gold) 95%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-desc {
    max-width: 340px; margin: 10px auto 0;
    color: rgba(255,255,240,0.6); font-size: 12px; font-weight: 400; line-height: 1.6;
  }

  /* View Toggle */
  .view-toggle-row {
    display: flex; gap: 8px;
    padding: 0 16px; margin: 16px 0 0;
    opacity: 0; transform: translateY(12px);
    animation: fadeUp 0.6s 0.38s var(--ease-out) forwards;
  }
  .vt-btn {
    flex: 1; padding: 9px 0; border-radius: 12px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid rgba(232,213,188,0.2);
    background: rgba(232,213,188,0.06);
    color: rgba(232,213,188,0.6);
    transition: all 0.22s ease; letter-spacing: 0.3px;
  }
  .vt-btn.active {
    background: var(--premium-gold);
    border-color: var(--premium-gold);
    color: #12121A;
    box-shadow: 0 6px 18px rgba(203,162,88,0.3);
    font-weight: 700;
  }

  /* Search */
  .search-section {
    display: flex; justify-content: center;
    padding: 0 16px; margin: 14px 0 0;
    opacity: 0; transform: translateY(14px);
    animation: fadeUp 0.6s 0.45s var(--ease-out) forwards;
  }
  .search-wrap { position: relative; width: 100%; }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); opacity: 0.5;
    pointer-events: none; display: flex; align-items: center;
  }
  .search-input {
    width: 100%; padding: 11px 16px 11px 42px;
    background: rgba(252,247,240,0.06);
    border: 1px solid rgba(252,247,240,0.13);
    backdrop-filter: blur(10px);
    border-radius: 50px; color: #fff;
    font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
    transition: all 0.3s ease;
  }
  .search-input::placeholder { color: rgba(255,245,235,0.35); }
  .search-input:focus {
    border-color: rgba(203,162,88,0.55);
    background: rgba(203,162,88,0.09);
    box-shadow: 0 0 0 3px rgba(203,162,88,0.1);
  }

  /* Filter row */
  .filter-row {
    display: flex; flex-wrap: wrap; gap: 7px;
    padding: 0 16px; margin: 12px 0;
    opacity: 0; transform: translateY(12px);
    animation: fadeUp 0.6s 0.55s var(--ease-out) forwards;
  }
  .pill-filter {
    background: rgba(232,213,188,0.07);
    border: 1px solid rgba(232,213,188,0.22);
    backdrop-filter: blur(4px);
    padding: 5px 14px; border-radius: 50px;
    font-size: 11px; font-weight: 600; color: #E8D5BC;
    transition: all 0.22s ease; letter-spacing: 0.2px; cursor: pointer;
  }
  .pill-filter.active, .pill-filter:hover {
    background: var(--premium-gold);
    border-color: var(--premium-gold);
    color: #12121A;
    box-shadow: 0 6px 14px rgba(203,162,88,0.28);
  }
  .pill-filter[data-filter="500"]:not(.active) { border-color: rgba(124,58,237,0.4); color: #c4b5fd; }
  .pill-filter[data-filter="400"]:not(.active) { border-color: rgba(13,148,136,0.4); color: #5eead4; }
  .pill-filter[data-filter="300"]:not(.active) { border-color: rgba(29,78,216,0.4); color: #93c5fd; }
  .pill-filter[data-filter="200"]:not(.active) { border-color: rgba(180,83,9,0.4); color: #fbbf24; }

  /* Results count */
  .results-bar {
    padding: 0 16px 8px;
    font-size: 11px; color: rgba(255,245,235,0.35);
    letter-spacing: 0.04em;
    opacity: 0; transform: translateY(8px);
    animation: fadeUp 0.5s 0.65s var(--ease-out) forwards;
  }
  .results-bar span { color: var(--premium-gold); font-weight: 600; }
  .results-label { color: rgba(255,245,235,0.35); }

  /* Members grid */
  .members-grid {
    display: flex; flex-direction: column; gap: 14px;
    padding: 0 16px 24px;
  }

  /* No results */
  .no-results { text-align: center; padding: 48px 20px; color: rgba(255,245,235,0.35); }
  .no-results h3 { font-family: 'Manrope', sans-serif; font-size: 1.1rem; margin-bottom: 6px; color: rgba(255,245,235,0.5); }

  /* Member card */
  .member-card {
    background: rgba(252,247,240,0.05);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(252,247,240,0.1);
    border-radius: 20px; overflow: hidden;
    cursor: pointer; display: flex; flex-direction: column;
    transition: all 0.35s var(--transition-smooth);
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    animation: fadeInUp 0.5s ease backwards;
  }
  .member-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-premium);
    border-color: rgba(203,162,88,0.4);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-accent {
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--premium-gold) 50%, transparent 100%);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.45s var(--ease-out);
  }
  .member-card:hover .card-accent { transform: scaleX(1); }

  .member-card[data-level="500"] { border-left: 3px solid rgba(124,58,237,0.7); }
  .member-card[data-level="400"] { border-left: 3px solid rgba(13,148,136,0.7); }
  .member-card[data-level="300"] { border-left: 3px solid rgba(29,78,216,0.7); }
  .member-card[data-level="200"] { border-left: 3px solid rgba(180,83,9,0.7); }

  .card-inner-row {
    display: flex; gap: 14px; padding: 16px 16px 12px;
  }
  .card-img-area {
    flex-shrink: 0; width: 62px; height: 62px;
    border-radius: 16px; overflow: hidden;
    background: #1e2d4a;
    border: 1px solid rgba(203,162,88,0.3);
    position: relative;
  }
  .skeleton-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #1e2d4a 0%, #2a3d5c 50%, #1e2d4a 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .member-img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.3s ease, opacity 0.4s ease;
    opacity: 0; position: relative; z-index: 1;
  }
  .member-img.loaded { opacity: 1; }
  .member-card:hover .member-img { transform: scale(1.05); }

  .card-text-area { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .member-name {
    font-family: 'Manrope', sans-serif; font-size: 15px;
    font-weight: 700; letter-spacing: -0.2px; color: #FFFBF5; line-height: 1.2;
  }
  .member-role {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--premium-gold);
    background: rgba(203,162,88,0.15);
    display: inline-block; padding: 2px 8px;
    border-radius: 30px; width: fit-content; margin-top: 5px;
  }
  .preview-bio {
    font-size: 11px; color: rgba(255,245,235,0.55);
    margin-top: 6px; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .level-badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    letter-spacing: 0.08em; padding: 2px 7px; border-radius: 20px;
    margin-top: 5px; width: fit-content;
  }
  .level-badge-500 { background: rgba(124,58,237,0.2); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.35); }
  .level-badge-400 { background: rgba(13,148,136,0.2); color: #5eead4; border: 1px solid rgba(13,148,136,0.35); }
  .level-badge-300 { background: rgba(29,78,216,0.2); color: #93c5fd; border: 1px solid rgba(29,78,216,0.35); }
  .level-badge-200 { background: rgba(180,83,9,0.2); color: #fbbf24; border: 1px solid rgba(180,83,9,0.35); }

  .expand-trigger {
    font-size: 10px; font-weight: 500; color: var(--premium-gold);
    padding: 8px 16px 10px;
    border-top: 1px solid rgba(255,255,240,0.07);
    display: flex; justify-content: space-between; align-items: center;
  }
  .expand-trigger span { letter-spacing: 0.5px; text-transform: uppercase; }

  /* Courses Grid */
  .courses-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 0 16px 24px;
  }
  .course-card {
    background: rgba(252,247,240,0.05);
    border: 1px solid rgba(252,247,240,0.1);
    border-radius: 16px; padding: 16px 14px;
    cursor: pointer; transition: all 0.25s ease;
    animation: fadeInUp 0.4s ease backwards;
  }
  .course-card:hover {
    background: rgba(203,162,88,0.1);
    border-color: rgba(203,162,88,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .cc-name {
    font-family: 'Manrope', sans-serif; font-size: 13px;
    font-weight: 700; color: #FFFBF5; line-height: 1.3; margin-bottom: 8px;
  }
  .cc-count { font-size: 22px; font-weight: 800; color: var(--premium-gold); font-family: 'Manrope', sans-serif; line-height: 1; }
  .cc-count-label { font-size: 10px; color: rgba(255,245,235,0.4); font-weight: 500; margin-top: 2px; }
  .cc-levels { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
  .cc-lvl-chip {
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; letter-spacing: 0.05em;
  }
  .cc-lvl-chip-500 { background: rgba(124,58,237,0.2); color: #c4b5fd; }
  .cc-lvl-chip-400 { background: rgba(13,148,136,0.2); color: #5eead4; }
  .cc-lvl-chip-300 { background: rgba(29,78,216,0.2); color: #93c5fd; }
  .cc-lvl-chip-200 { background: rgba(180,83,9,0.2); color: #fbbf24; }
  .cc-tap-hint { font-size: 9px; color: rgba(255,245,235,0.3); margin-top: 8px; letter-spacing: 0.04em; }

  /* ── FIXED MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(6,17,31,0.94);
    backdrop-filter: blur(20px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: all 0.3s ease;
  }
  .modal-overlay.active { opacity: 1; visibility: visible; }
  .modal-container {
    width: 100%; max-width: 520px; max-height: 88vh;
    background: rgba(11,26,53,0.92);
    border: 1px solid rgba(203,162,88,0.35);
    border-radius: 28px 28px 0 0;
    overflow-y: auto; overflow-x: hidden;
    transform: translateY(30px);
    transition: transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1);
    scrollbar-width: none;
  }
  .modal-container::-webkit-scrollbar { display: none; }
  .modal-overlay.active .modal-container { transform: translateY(0); }
  .modal-drag-handle {
    width: 40px; height: 4px; border-radius: 4px;
    background: rgba(255,255,255,0.2);
    margin: 12px auto 0;
  }
  .modal-img-full {
    width: 100%; height: 200px;
    object-fit: cover; object-position: center top; display: block;
  }
  .modal-body { padding: 20px 20px 30px; }
  .modal-course-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--premium-gold); background: rgba(203,162,88,0.18);
    display: inline-block; padding: 3px 12px; border-radius: 30px; margin-bottom: 8px;
  }
  .modal-level-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; padding: 3px 12px; border-radius: 30px;
    margin-bottom: 12px; margin-left: 6px;
  }
  .modal-name {
    font-family: 'Manrope', sans-serif; font-size: 1.5rem;
    font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; color: #fff;
  }
  .modal-bio { color: rgba(255,247,235,0.8); line-height: 1.65; font-size: 13px; margin: 12px 0; }
  .contact-panel {
    background: rgba(203,162,88,0.07); border-radius: 16px;
    padding: 14px 16px; margin-top: 16px;
    border: 1px solid rgba(203,162,88,0.2);
  }
  .contact-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; margin-bottom: 12px; color: #F0E4D0;
    border-left: 2px solid var(--premium-gold); padding-left: 10px;
  }

    { id:47, name:"Sa'ad Auwal", course:"Software Engineering", level:"200", phone:"09038666754",
      img:"https://ui-avatars.com/api/?name=Sa%27ad+Auwal&background=3b1a06&color=CBA258&size=400&bold=true&font-size=0.35",
      bio:"Software Engineering · 200 Level", fullBio:"Member of Tangaza Local Government Students' Union at Usmanu Danfodiyo University Sokoto. Studying Software Engineering at 200 Level. Academic Session: 2025/2026." },
    { id:48, name:"Marwan Umar G-madi", course:"Software Engineering", level:"200", phone:"09167088689",
      img:"https://ui-avatars.com/api/?name=Marwan+Umar+G-madi&background=3b1a06&color=CBA258&size=400&bold=true&font-size=0.35",
      bio:"Software Engineering · 200 Level", fullBio:"Member of Tangaza Local Government Students' Union at Usmanu Danfodiyo University Sokoto. Studying Software Engineering at 200 Level. Academic Session: 2025/2026." },
    { id:49, name:"Yusuf Aliyu", course:"Guidance & Counselling", level:"200", phone:"07060433578",
      img:"https://ui-avatars.com/api/?name=Yusuf+Aliyu&background=3b1a06&color=CBA258&size=400&bold=true&font-size=0.35",
      bio:"Guidance & Counselling · 200 Level", fullBio:"Member of Tangaza Local Government Students' Union at Usmanu Danfodiyo University Sokoto. Studying Guidance & Counselling at 200 Level. Academic Session: 2025/2026." },
    { id:50, name:"Sani Yahayya", course:"Library & Information Science", level:"200", phone:"08139017141",
      img:"https://ui-avatars.com/api/?name=Sani+Yahayya&background=3b1a06&color=CBA258&size=400&bold=true&font-size=0.35",
      bio:"Library & Information Science · 200 Level", fullBio:"Member of Tangaza Local Government Students' Union at Usmanu Danfodiyo University Sokoto. Studying Library & Information Science at 200 Level. Academic Session: 2025/2026." }
  ];

  const levelColors = {
    '500': { bg:'#2d1a5e', badge:'level-badge-500', chipCls:'cc-lvl-chip-500' },
    '400': { bg:'#0a2e2b', badge:'level-badge-400', chipCls:'cc-lvl-chip-400' },
    '300': { bg:'#0f2352', badge:'level-badge-300', chipCls:'cc-lvl-chip-300' },
    '200': { bg:'#3b1a06', badge:'level-badge-200', chipCls:'cc-lvl-chip-200' }
  };

  const membersGrid  = document.getElementById('membersGrid');
  const filterBtns   = document.querySelectorAll('.pill-filter');
  const filterBar    = document.getElementById('filterBar');
  const searchInput  = document.getElementById('searchInput');
  const resultsCount = document.getElementById('resultsCount');
  const resultsLabel = document.getElementById('resultsLabel');
  let activeFilter   = 'all';
  let searchQuery    = '';
  let currentView    = 'members';

  /* ── Render Members ── */
  function renderCards() {
    const filtered = membersData.filter(m => {
      const matchFilter = activeFilter === 'all' || m.level === activeFilter;
      const matchSearch = !searchQuery ||
        m.name.toLowerCase().includes(searchQuery) ||
        m.course.toLowerCase().includes(searchQuery);
      return matchFilter && matchSearch;
    });
    resultsCount.textContent = filtered.length;
    resultsLabel.textContent = 'members';
    membersGrid.className = 'members-grid';
    membersGrid.innerHTML = '';

    if (!filtered.length) {
      membersGrid.innerHTML = `<div class="no-results"><h3>No results found</h3><p>Try a different name or course.</p></div>`;
      return;
    }
    filtered.forEach((m, i) => {
      const lc = levelColors[m.level];
      const card = document.createElement('div');
      card.className = 'member-card';
      card.dataset.level = m.level;
      card.style.animationDelay = `${i * 0.05}s`;
      const imgUrl = m.img || `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=${lc.bg.replace('#','')}&color=CBA258&size=200&bold=true&font-size=0.35`;
      card.innerHTML = `
        <div class="card-accent"></div>
        <div class="card-inner-row">
          <div class="card-img-area">
            <div class="skeleton-shimmer"></div>
            <img class="member-img" src="${imgUrl}" alt="${m.name}" loading="lazy">
          </div>
          <div class="card-text-area">
            <div class="member-name">${m.name}</div>
            <div class="member-role">${m.course}</div>
            <div class="level-badge ${lc.badge}">${m.level} Level</div>
            <div class="preview-bio">${m.bio}</div>
          </div>
        </div>
        <div class="expand-trigger">
          <span>View Profile</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CBA258" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </div>`;
      const img = card.querySelector('.member-img');
      img.addEventListener('load', () => img.classList.add('loaded'));
      if (img.complete) img.classList.add('loaded');
      card.addEventListener('click', () => openModal(m));
      membersGrid.appendChild(card);
    });
  }

  /* ── Render Courses ── */
  function renderCourses() {
    const courseMap = {};
    membersData.forEach(m => {
      if (!courseMap[m.course]) courseMap[m.course] = { members:[], levels: new Set() };
      courseMap[m.course].members.push(m);
      courseMap[m.course].levels.add(m.level);
    });
    const sortedCourses = Object.entries(courseMap).sort((a,b) => a[0].localeCompare(b[0]));
    resultsCount.textContent = sortedCourses.length;
    resultsLabel.textContent = 'courses';
    membersGrid.className = 'courses-grid';
    membersGrid.innerHTML = '';
    sortedCourses.forEach(([course, data], i) => {
      const card = document.createElement('div');
      card.className = 'course-card';
      card.style.animationDelay = `${i * 0.04}s`;
      const levelsHtml = [...data.levels].sort().map(lv =>
        `<span class="cc-lvl-chip ${levelColors[lv].chipCls}">${lv}L</span>`).join('');
      card.innerHTML = `
        <div class="cc-name">${course}</div>
        <div class="cc-count">${data.members.length}</div>
        <div class="cc-count-label">member${data.members.length > 1 ? 's' : ''}</div>
        <div class="cc-levels">${levelsHtml}</div>
        <div class="cc-tap-hint">↗ Tap to see members</div>`;
      card.addEventListener('click', () => {
        switchToMembers();
        searchInput.value = course;
        searchQuery = course.toLowerCase();
        activeFilter = 'all';
        filterBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-filter="all"]').classList.add('active');
        renderCards();
      });
      membersGrid.appendChild(card);
    });
  }

  /* ── View switching ── */
  const viewMembersBtn = document.getElementById('viewMembersBtn');
  const viewCoursesBtn = document.getElementById('viewCoursesBtn');

  function switchToMembers() {
    currentView = 'members';
    viewMembersBtn.classList.add('active');
    viewCoursesBtn.classList.remove('active');
    filterBar.style.display = 'flex';
    searchInput.placeholder = 'Search by name or course…';
    renderCards();
  }
  function switchToCourses() {
    currentView = 'courses';
    viewCoursesBtn.classList.add('active');
    viewMembersBtn.classList.remove('active');
    filterBar.style.display = 'none';
    searchInput.placeholder = 'Courses view — tap a card to filter members';
    renderCourses();
  }
  viewMembersBtn.addEventListener('click', switchToMembers);
  viewCoursesBtn.addEventListener('click', switchToCourses);

  /* ── Modal ── */
  const detailModal  = document.getElementById('detailModal');
  const modalContent = document.getElementById('modalDynamicContent');

  function openModal(m) {
    const lc = levelColors[m.level];
    const imgUrl = m.img || `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=${lc.bg.replace('#','')}&color=CBA258&size=400&bold=true&font-size=0.35`;
    const phoneLink = m.phone !== 'N/A' ? `<a href="tel:${m.phone}">${m.phone}</a>` : 'Not available';
    modalContent.innerHTML = `
      <div class="modal-drag-handle"></div>
      <img class="modal-img-full" src="${imgUrl}" alt="${m.name}">
      <div class="modal-body">
        <div>
          <span class="modal-course-badge">${m.course}</span>
          <span class="modal-level-badge ${lc.badge}">${m.level} Level</span>
        </div>
        <div class="modal-name">${m.name}</div>
        <p class="modal-bio">${m.fullBio}</p>
        <div class="contact-panel">
          <div class="contact-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CBA258" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .99h3a2 2 0 012 1.72c.13 1 .36 1.98.7 2.93a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.95.34 1.93.57 2.93.7A2 2 0 0122 16.92z"/></svg>
            ${phoneLink}
          </div>
          <div class="contact-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CBA258" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
            UDUS · Tangaza LGA · 2025/2026
          </div>
          <div class="contact-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CBA258" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            S/N #${m.id} on Official Register
          </div>
        </div>
        <div class="modal-close-row">
          <button class="close-modal-btn" id="closeModalBtn">✕</button>
        </div>
      </div>`;
    detailModal.classList.add('active');
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  }
  function closeModal() { detailModal.classList.remove('active'); }
  detailModal.addEventListener('click', e => { if (e.target === detailModal) closeModal(); });

  /* ── Filters & Search ── */
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      if (currentView === 'members') renderCards();
    });
  });
  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value.toLowerCase().trim();
    if (currentView === 'members') renderCards();
  });

  /* ── Slide Menu ── */
  const panel   = document.getElementById('panel');
  const overlay = document.getElementById('overlay');
  const openBtn = document.getElementById('openBtn');
  const closeBtn = document.getElementById('closeBtn');

  function openMenu()  { panel.classList.add('open'); overlay.classList.add('show'); }
  function closeMenu() { panel.classList.remove('open'); overlay.classList.remove('show'); }
  openBtn.addEventListener('click', openMenu);
  closeBtn.addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);

  document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', () => {
      const href = item.getAttribute('data-href');
      if (href) setTimeout(() => { window.location.href = href; }, 200);
      else setTimeout(closeMenu, 180);
    });
  });
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const href = btn.getAttribute('data-href');
      if (href) setTimeout(() => { window.location.href = href; }, 150);
    });
  });

  renderCards();
</script>
</body>
</html>
